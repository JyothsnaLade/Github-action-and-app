name: Cortex Fix

on:
  pull_request:
    branches:
      - main

jobs:
  cortex-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: JyothsnaLade/cortex-fix-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
       